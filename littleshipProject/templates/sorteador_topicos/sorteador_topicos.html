{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de tópicos</title>
    <style>
        body {
            background-color: #d8d8d8;
        }

        #assuntoBotao {
            padding: 15px;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <h1>O gerador de tópicos!</h1>
    <a href="/index/"><h2>Página Principal</h2></a>
    <p>Sem ideia do que falar com os outros E.T.s? Basta usar o gerador de tópicos!</p>
    <button id="assuntoBotao" onclick="gerarAssunto()">Gerar assunto</button>
    <p id="assunto"></p>

    <script>
        let arrayAssuntos = [
            'Comidas', 'Músicas', 'Teorias', 'Jogos',
            'Curiosidades aleatórias','Filmes', 'Séries', 'Preferências dos E.T.s',
            'Memes'
        ];
        let assuntoInt;


        function gerarAssunto() {
            assuntoInt = Math.floor(Math.random() * arrayAssuntos.length);
            document.getElementById('assunto').textContent = `Porquê vocês não conversam sobre ${arrayAssuntos[assuntoInt]}?`;
            console.log(assuntoInt) // Debug
        }
    </script>
</body>
</html>
